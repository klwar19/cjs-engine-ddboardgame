<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CJS Editor — Cosmic Jester System</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Editor-specific overrides */
    .app-sidebar .nav-section {
      padding: 8px 16px 4px;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-mute);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .editor-panel { display: none; height: 100%; }
    .editor-panel.active { display: block; }
    .status-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 4px 16px;
      font-size: 0.78rem;
      color: var(--text-dim);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .status-bar .counts { display: flex; gap: 12px; }
    .status-bar .dirty { color: var(--gold); }
    /* Hint boxes for effect suitability */
    .hint-box { background:rgba(168,85,247,0.08); border:1px solid rgba(168,85,247,0.2); border-radius:6px; padding:8px 12px; font-size:0.8rem; color:var(--text); margin-bottom:10px; line-height:1.5; }
    .hint-box.hint-info { background:rgba(59,130,246,0.08); border-color:rgba(59,130,246,0.2); }
    /* Chip selectors */
    .chip { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:14px; font-size:0.78rem; color:var(--text); margin:2px; white-space:nowrap; }
    .chip-x { background:none; border:none; color:var(--red); cursor:pointer; font-size:0.9rem; padding:0 2px; line-height:1; }
    .chip-x:hover { color:#ff6b6b; }
    .chip-and { font-size:0.7rem; color:var(--text-mute); margin:0 4px; font-weight:600; }
    .chip-row { display:inline; }
    .cond-add { font-size:0.8rem; margin-top:4px; }
    /* Data browser table */
    .db-table { width:100%; border-collapse:collapse; font-size:0.78rem; }
    .db-table th { position:sticky; top:0; background:var(--surface); padding:6px 8px; text-align:left; border-bottom:2px solid var(--border); color:var(--accent); font-weight:600; white-space:nowrap; }
    .db-table td { padding:4px 8px; border-bottom:1px solid rgba(255,255,255,0.04); color:var(--text); white-space:nowrap; max-width:200px; overflow:hidden; text-overflow:ellipsis; }
    .db-table tr:hover td { background:rgba(255,255,255,0.03); }
    .db-table tr:nth-child(even) td { background:rgba(255,255,255,0.015); }
    /* Status editor */
    .status-cat-header { padding:6px 12px; font-size:0.75rem; font-weight:700; color:var(--text-mute); text-transform:uppercase; letter-spacing:0.5px; margin-top:8px; }
  </style>
</head>
<body>
  <div class="app-shell">
    <!-- ── HEADER ──────────────────────────────────────────── -->
    <div class="app-header">
      <h1>⚡ CJS Editor</h1>
      <div class="btn-group" style="margin-left:auto">
        <button class="btn btn-ghost btn-sm" id="btn-import" title="Import JSON">📂 Import</button>
        <button class="btn btn-ghost btn-sm" id="btn-export" title="Export JSON">💾 Export</button>
        <button class="btn btn-ghost btn-sm" id="btn-validate" title="Validate all references">✅ Validate</button>
        <a href="index.html" class="btn btn-ghost btn-sm" style="text-decoration:none">🧪 Tests</a>
        <a href="combat.html" class="btn btn-ghost btn-sm" style="text-decoration:none;color:#fca5a5">⚔️ Combat</a>
      </div>
      <input type="file" id="import-file" accept=".json" style="display:none">
    </div>

    <!-- ── BODY ────────────────────────────────────────────── -->
    <div class="app-body">
      <!-- SIDEBAR -->
      <div class="app-sidebar" id="sidebar">
        <div class="nav-section">Content</div>
        <div class="nav-item active" data-panel="effects">
          <span>✦</span> <span>Effects</span>
          <span class="badge" id="count-effects">0</span>
        </div>
        <div class="nav-item" data-panel="statuses">
          <span>💫</span> <span>Status Defs</span>
        </div>
        <div class="nav-item" data-panel="passives">
          <span>🛡️</span> <span>Passives</span>
          <span class="badge" id="count-passives">0</span>
        </div>
        <div class="nav-item" data-panel="skills">
          <span>⚔️</span> <span>Skills</span>
          <span class="badge" id="count-skills">0</span>
        </div>
        <div class="nav-item" data-panel="items">
          <span>📦</span> <span>Items</span>
          <span class="badge" id="count-items">0</span>
        </div>

        <div class="nav-section">Units</div>
        <div class="nav-item" data-panel="characters">
          <span>🧑</span> <span>Characters</span>
          <span class="badge" id="count-characters">0</span>
        </div>
        <div class="nav-item" data-panel="monsters">
          <span>👾</span> <span>Monsters</span>
          <span class="badge" id="count-monsters">0</span>
        </div>

        <div class="nav-section">World</div>
        <div class="nav-item" data-panel="encounters">
          <span>🗺️</span> <span>Encounters</span>
          <span class="badge" id="count-encounters">0</span>
        </div>

        <div class="nav-section">Tools</div>
        <div class="nav-item" data-panel="browser">
          <span>📊</span> <span>Data Browser</span>
        </div>
      </div>

      <!-- MAIN CONTENT -->
      <div class="app-content" id="main-content">
        <div class="editor-panel active" id="panel-effects"></div>
        <div class="editor-panel" id="panel-statuses"></div>
        <div class="editor-panel" id="panel-passives"></div>
        <div class="editor-panel" id="panel-skills"></div>
        <div class="editor-panel" id="panel-items"></div>
        <div class="editor-panel" id="panel-characters"></div>
        <div class="editor-panel" id="panel-monsters"></div>
        <div class="editor-panel" id="panel-encounters"></div>
        <div class="editor-panel" id="panel-browser"></div>
      </div>
    </div>

    <!-- ── STATUS BAR ──────────────────────────────────────── -->
    <div class="status-bar">
      <div class="counts" id="status-counts"></div>
      <div>
        <span id="status-dirty"></span>
        <span id="status-msg">Ready</span>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- SCRIPTS — Phase 1 (foundation) in dependency order       -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <script src="js/core/constants.js"></script>
  <script src="js/core/formulas.js"></script>
  <script src="js/core/dice.js"></script>
  <script src="js/core/data-store.js"></script>
  <script src="js/effects/value-calc.js"></script>
  <script src="js/effects/conditions.js"></script>
  <script src="js/effects/effect-registry.js"></script>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- SCRIPTS — Phase 2 (editors) in dependency order           -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <script src="js/ui/ui-helpers.js"></script>
  <script src="js/builders/effect-editor.js"></script>
  <script src="js/builders/status-editor.js"></script>
  <script src="js/builders/passive-editor.js"></script>
  <script src="js/builders/skill-editor.js"></script>
  <script src="js/builders/item-editor.js"></script>
  <script src="js/builders/char-editor.js"></script>
  <script src="js/builders/monster-editor.js"></script>
  <script src="js/builders/encounter-editor.js"></script>
  <script src="js/ui/data-browser.js"></script>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- APP INIT                                                  -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <script>
    (function() {
      'use strict';

      const DS = CJS.DataStore;
      const UI = CJS.UI;

      // ── Sidebar navigation ─────────────────────────────────
      const sidebar = document.getElementById('sidebar');
      const navItems = sidebar.querySelectorAll('.nav-item');
      const panels = document.querySelectorAll('.editor-panel');

      let activePanel = 'effects';
      let editorsInitialized = {};

      navItems.forEach(nav => {
        nav.addEventListener('click', () => {
          const panel = nav.dataset.panel;
          if (panel === activePanel) return;

          // Update nav
          navItems.forEach(n => n.classList.remove('active'));
          nav.classList.add('active');

          // Update panels
          panels.forEach(p => p.classList.remove('active'));
          document.getElementById(`panel-${panel}`).classList.add('active');
          activePanel = panel;

          // Lazy-init editors
          initEditor(panel);
        });
      });

      // ── Editor initialization (lazy) ───────────────────────
      const editorMap = {
        effects:    CJS.EffectEditor,
        statuses:   CJS.StatusEditor,
        passives:   CJS.PassiveEditor,
        skills:     CJS.SkillEditor,
        items:      CJS.ItemEditor,
        characters: CJS.CharEditor,
        monsters:   CJS.MonsterEditor,
        encounters: CJS.EncounterEditor,
        browser:    CJS.DataBrowser
      };

      function initEditor(name) {
        if (editorsInitialized[name]) {
          editorMap[name]?.refresh?.();
          return;
        }
        const panel = document.getElementById(`panel-${name}`);
        if (editorMap[name]) {
          editorMap[name].init(panel);
          editorsInitialized[name] = true;
        }
      }

      // ── Load data on boot ─────────────────────────────────
      // Priority: data/gamedata.json (full save) → data/master-effects.json (effects only)
      function loadData() {
        return fetch('data/gamedata.json')
          .then(r => {
            if (!r.ok) throw new Error('Not found');
            return r.json();
          })
          .then(data => {
            const result = DS.loadData(data);
            const counts = DS.getCounts();
            const total = Object.values(counts).reduce((a, b) => a + b, 0);
            console.log(`Loaded gamedata.json (${total} entries)`);
            UI.toast(`Loaded save: ${counts.effects} effects, ${counts.skills} skills, ${counts.characters} chars, ${counts.monsters} mons`, 'success', 4000);
            updateCounts();
          })
          .catch(() => {
            // Fallback: load just master effects
            console.log('No gamedata.json found, falling back to master-effects.json');
            return fetch('data/master-effects.json')
              .then(r => r.json())
              .then(data => {
                const entries = Object.entries(data.effects || {})
                  .filter(([k]) => !k.startsWith('__COMMENT'));
                let count = 0;
                for (const [id, effect] of entries) {
                  if (!DS.exists('effects', id)) {
                    DS.create('effects', { ...effect, id });
                    count++;
                  }
                }
                console.log(`Loaded ${count} master effects`);
                updateCounts();
              })
              .catch(err => {
                console.warn('Could not load any data:', err.message);
                UI.toast('No data files found. Create content or import a save.', 'info', 5000);
              });
          });
      }

      // ── Import / Export ────────────────────────────────────
      document.getElementById('btn-export').addEventListener('click', () => {
        DS.downloadJSON('gamedata.json');
        document.getElementById('status-msg').textContent = 'Exported!';
        UI.toast('Data exported', 'success');
      });

      document.getElementById('btn-import').addEventListener('click', () => {
        document.getElementById('import-file').click();
      });

      document.getElementById('import-file').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          const result = DS.importJSON(ev.target.result);
          if (result.success) {
            UI.toast(`Imported! ${result.validation.errors.length} errors, ${result.validation.warnings.length} warnings`, result.validation.errors.length > 0 ? 'error' : 'success');
            updateCounts();
            // Refresh active editor
            Object.keys(editorsInitialized).forEach(k => { editorsInitialized[k] = false; });
            initEditor(activePanel);
          } else {
            UI.toast(`Import failed: ${result.error}`, 'error');
          }
        };
        reader.readAsText(file);
        e.target.value = ''; // reset
      });

      // ── Validate ───────────────────────────────────────────
      document.getElementById('btn-validate').addEventListener('click', () => {
        const result = DS.validate();
        if (result.valid && result.warnings.length === 0) {
          UI.toast('All references valid! ✅', 'success');
        } else {
          let msg = '';
          if (result.errors.length > 0) msg += `${result.errors.length} errors:\n${result.errors.join('\n')}\n\n`;
          if (result.warnings.length > 0) msg += `${result.warnings.length} warnings:\n${result.warnings.join('\n')}`;
          UI.openModal({
            title: `Validation: ${result.errors.length} errors, ${result.warnings.length} warnings`,
            content: `<pre style="white-space:pre-wrap;font-size:0.82rem;max-height:400px;overflow:auto">${msg}</pre>`,
            width: '650px'
          });
        }
      });

      // ── Update sidebar counts ──────────────────────────────
      function updateCounts() {
        const counts = DS.getCounts();
        for (const [key, val] of Object.entries(counts)) {
          const el = document.getElementById(`count-${key}`);
          if (el) el.textContent = val;
        }
        // Status bar
        const statusCounts = document.getElementById('status-counts');
        statusCounts.innerHTML = Object.entries(counts)
          .filter(([k]) => ['effects','skills','items','passives','characters','monsters','encounters'].includes(k))
          .map(([k,v]) => `<span>${k}: <b>${v}</b></span>`)
          .join('');

        const dirtyEl = document.getElementById('status-dirty');
        dirtyEl.textContent = DS.isDirty() ? '● Unsaved changes' : '';
        dirtyEl.className = DS.isDirty() ? 'dirty' : '';
      }

      // ── Dirty check on page leave ──────────────────────────
      window.addEventListener('beforeunload', (e) => {
        if (DS.isDirty()) {
          e.preventDefault();
          e.returnValue = 'You have unsaved changes. Export before leaving?';
        }
      });

      // ── Periodic count update ──────────────────────────────
      setInterval(updateCounts, 2000);

      // ── BOOT ───────────────────────────────────────────────
      loadData().then(() => {
        // Seed built-in STATUS_DEFINITIONS so status-editor and combat can read them
        const CONST = window.CJS.CONST;
        if (CONST && CONST.STATUS_DEFINITIONS) {
          for (const [id, def] of Object.entries(CONST.STATUS_DEFINITIONS)) {
            if (!DS.exists('statuses', id)) {
              DS.replace('statuses', id, { ...def, id });
            }
          }
        }
        initEditor('effects');
        updateCounts();
        document.getElementById('status-msg').textContent = 'Ready';
      });

    })();
  </script>
</body>
</html>
