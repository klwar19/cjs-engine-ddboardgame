<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CJS Combat Simulator</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/combat.css" />
</head>
<body>
  <div id="combat-app">
    <!-- Header -->
    <header class="combat-header">
      <a href="index.html" class="back-link">← Main Menu</a>
      <h1>⚔️ CJS Combat Simulator</h1>
      <div class="header-controls">
        <select id="encounter-select">
          <option value="">-- Select Encounter --</option>
        </select>
        <button id="btn-start" class="btn btn-primary">Start Combat</button>
        <button id="btn-import" class="btn">📥 Import Data</button>
        <input type="file" id="file-import" accept=".json" style="display:none" />
      </div>
    </header>

    <!-- Main combat container (filled by CombatUI) -->
    <main id="combat-container"></main>
  </div>

  <!-- Phase 1: Core -->
  <script src="js/core/constants.js"></script>
  <script src="js/core/formulas.js"></script>
  <script src="js/core/dice.js"></script>
  <script src="js/core/undo-manager.js"></script>
  <script src="js/core/data-store.js"></script>
  <script src="js/core/skill-resolver.js"></script>

  <!-- Phase 1: Effects -->
  <script src="js/effects/value-calc.js"></script>
  <script src="js/effects/conditions.js"></script>
  <script src="js/effects/effect-registry.js"></script>
  <script src="js/effects/effect-resolver.js"></script>

  <!-- Phase 3: Grid -->
  <script src="js/grid/grid-engine.js"></script>
  <script src="js/grid/pathfinding.js"></script>
  <script src="js/grid/aoe.js"></script>

  <!-- Phase 3: Combat -->
  <script src="js/combat/stat-compiler.js"></script>
  <script src="js/combat/damage-calc.js"></script>
  <script src="js/combat/dice-service.js"></script>
  <script src="js/combat/status-manager.js"></script>
  <script src="js/combat/action-handler.js"></script>
  <script src="js/combat/combat-log.js"></script>
  <script src="js/combat/combat-settings.js"></script>
  <script src="js/combat/combat-manager.js"></script>

  <!-- Phase 3: AI -->
  <script src="js/ai/ai-conditions.js"></script>
  <script src="js/ai/ai-targeting.js"></script>
  <script src="js/ai/ai-controller.js"></script>

  <!-- Phase 4: QTE -->
  <script src="js/qte/qte-quickpress.js"></script>
  <script src="js/qte/qte-mash.js"></script>
  <script src="js/qte/qte-fishing.js"></script>
  <script src="js/qte/qte-rhythm.js"></script>
  <script src="js/qte/qte-quiz.js"></script>
  <script src="js/qte/qte-manager.js"></script>

  <!-- Phase 5: Narrator -->
  <script src="js/narrator/narrator-state.js"></script>
  <script src="js/narrator/narrator-data.js"></script>
  <script src="js/narrator/narrator-engine.js"></script>

  <!-- Phase 5: Visual / UI -->
  <script src="js/grid/grid-renderer.js"></script>
  <script src="js/ui/ui-helpers.js"></script>
  <script src="js/ui/combat-ui.js"></script>
  <script src="js/ui/loot-roller.js"></script>

  <!-- App bootstrap -->
  <script>
  (async function() {
    'use strict';
    const DS = window.CJS.DataStore;
    const ND = window.CJS.NarratorData;

    // ── LOAD DATA ─────────────────────────────────────────────────
    async function loadData() {
      // Load gamedata
      try {
        const gameResp = await fetch('data/gamedata.json');
        if (gameResp.ok) {
          const gameData = await gameResp.json();
          DS.loadData(gameData);
          console.log('Game data loaded:', DS.getCounts());
        }
      } catch (err) {
        console.warn('gamedata.json load error:', err.message);
      }

      // Load master effects (dict format: { effects: { id: {...}, ... } })
      try {
        const effectsResp = await fetch('data/master-effects.json');
        if (effectsResp.ok) {
          const raw = await effectsResp.json();
          const effectsObj = raw.effects || raw;
          if (typeof effectsObj === 'object' && !Array.isArray(effectsObj)) {
            for (const [id, eff] of Object.entries(effectsObj)) {
              eff.id = eff.id || id;
              DS.replace('effects', eff.id, eff);
            }
          } else if (Array.isArray(effectsObj)) {
            for (const eff of effectsObj) DS.replace('effects', eff.id, eff);
          }
          console.log('Master effects loaded.');
        }
      } catch (err) {
        console.warn('master-effects.json load error:', err.message);
      }

      // Load quips
      try {
        const quipsResp = await fetch('data/quips.json');
        if (quipsResp.ok) {
          const quips = await quipsResp.json();
          await ND.load(quips.fragments || quips);
          console.log('Quips loaded:', ND.count(), 'fragments');
        }
      } catch (err) {
        console.warn('quips.json load error:', err.message);
      }

      // Load quiz bank (for quiz QTEs) if not already in gamedata
      try {
        const quizCount = DS.getAllAsArray('quizBank');
        if (!quizCount || quizCount.length === 0) {
          const quizResp = await fetch('data/quiz-bank.json');
          if (quizResp.ok) {
            const quizData = await quizResp.json();
            const questions = quizData.questions || quizData;
            if (Array.isArray(questions) && questions.length > 0) {
              DS.loadData({ quizBank: questions });
              console.log('Quiz bank loaded:', questions.length, 'questions');
            }
          }
        }
      } catch (err) {
        console.warn('quiz-bank.json load error:', err.message);
      }

      // Seed built-in STATUS_DEFINITIONS into DataStore so status-manager
      // can read behavior flags (preventsAction, tickDamageType, etc.).
      // Only seeds entries that don't already exist (custom overrides win).
      try {
        const UM = window.CJS.UndoManager;
        const CONST = window.CJS.CONST;
        if (UM) UM.disable();
        if (CONST && CONST.STATUS_DEFINITIONS) {
          let seeded = 0;
          for (const [id, def] of Object.entries(CONST.STATUS_DEFINITIONS)) {
            if (!DS.exists('statuses', id)) {
              DS.replace('statuses', id, { ...def, id });
              seeded++;
            }
          }
          console.log('Built-in statuses seeded:', seeded);
        }
        if (UM) { UM.enable(); UM.clear(); }
      } catch (err) {
        console.warn('Status seeding error:', err.message);
      }
    }

    // ── POPULATE ENCOUNTER SELECT ─────────────────────────────────
    let _demoCreated = false;
    function populateEncounters() {
      const sel = document.getElementById('encounter-select');
      const encounters = DS.getAll('encounters') || {};
      sel.innerHTML = '<option value="">-- Select Encounter --</option>';

      for (const [id, enc] of Object.entries(encounters)) {
        const name = enc.name || id;
        const opt = document.createElement('option');
        opt.value = id;
        opt.textContent = name;
        sel.appendChild(opt);
      }

      // If no encounters, add a demo option (once)
      if (Object.keys(encounters).length === 0 && !_demoCreated) {
        _demoCreated = true;
        _createDemoEncounter();
        populateEncounters();
        return;
      }
    }

    // ── DEMO ENCOUNTER (fallback) ─────────────────────────────────
    function _createDemoEncounter() {
      // Create minimal demo characters if none exist
      const chars = DS.getAll('characters') || {};
      if (Object.keys(chars).length === 0) {
        DS.replace('characters', 'bin', {
          id: 'bin', name: 'Bin Chen', icon: '🃏', team: 'player',
          rank: 'F', type: 'humanoid',
          stats: { S: 5, P: 6, E: 5, C: 8, I: 7, A: 6, L: 5 },
          skills: [], equipment: [], innatePassives: [],
          movement: 3
        });
        DS.replace('characters', 'bowy', {
          id: 'bowy', name: 'Bowy', icon: '🐗', team: 'player',
          rank: 'F', type: 'humanoid',
          stats: { S: 7, P: 7, E: 6, C: 4, I: 4, A: 5, L: 5 },
          skills: [], equipment: [], innatePassives: [],
          movement: 3
        });
      }

      const mons = DS.getAll('monsters') || {};
      if (Object.keys(mons).length === 0) {
        DS.replace('monsters', 'ice_wolf', {
          id: 'ice_wolf', name: 'Ice Wolf', icon: '🐺', team: 'enemy',
          rank: 'F', type: 'beast',
          stats: { S: 6, P: 5, E: 4, C: 2, I: 3, A: 7, L: 3 },
          skills: [], equipment: [], innatePassives: [],
          movement: 4,
          loot: [],
          aiRules: [
            { priority: 1, condition: 'any_adjacent_enemy', action: 'attack', target: 'lowest_hp' },
            { priority: 2, condition: 'default', action: 'move_toward', target: 'nearest_enemy' }
          ]
        });
        DS.replace('monsters', 'frost_goblin', {
          id: 'frost_goblin', name: 'Frost Goblin', icon: '👺', team: 'enemy',
          rank: 'F', type: 'humanoid',
          stats: { S: 4, P: 4, E: 3, C: 3, I: 5, A: 5, L: 4 },
          skills: [], equipment: [], innatePassives: [],
          movement: 3,
          loot: [],
          aiRules: [
            { priority: 1, condition: 'default', action: 'attack', target: 'nearest_enemy' }
          ]
        });
      }

      // Create demo encounter
      const grid = Array.from({ length: 8 }, () => Array(8).fill('empty'));
      grid[2][3] = 'obstacle';
      grid[5][4] = 'obstacle';
      grid[3][6] = 'fire_zone';
      grid[4][1] = 'ice_zone';

      DS.replace('encounters', 'demo_frostwood', {
        id: 'demo_frostwood',
        name: 'Frostwood Patrol (Demo)',
        width: 8, height: 8,
        grid: grid,
        units: [
          { id: 'bin', pos: [6, 1], size: '1x1' },
          { id: 'bowy', pos: [6, 3], size: '1x1' },
          { id: 'ice_wolf', pos: [1, 2], size: '1x1' },
          { id: 'frost_goblin', pos: [1, 5], size: '1x1' }
        ]
      });
    }

    // ── IMPORT HANDLER ────────────────────────────────────────────
    document.getElementById('btn-import').addEventListener('click', () => {
      document.getElementById('file-import').click();
    });

    document.getElementById('file-import').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        const data = JSON.parse(text);
        DS.loadData(data);
        populateEncounters();
        console.log('Data imported successfully.');
      } catch (err) {
        alert('Import failed: ' + err.message);
      }
    });

    // ── START COMBAT ──────────────────────────────────────────────
    document.getElementById('btn-start').addEventListener('click', () => {
      const encId = document.getElementById('encounter-select').value;
      if (!encId) { alert('Select an encounter first.'); return; }

      try {
        // Reset CombatSettings and configure teams
        const CS = window.CJS.CombatSettings;
        if (CS) {
          CS.reset();
          CS.setTeamControl('player', 'manual');
          CS.setTeamControl('enemy', 'ai');
        }

        // Init CombatUI
        const container = document.getElementById('combat-container');
        window.CJS.CombatUI.init(container);
        window.CJS.CombatUI.startCombat(encId);
      } catch (err) {
        console.error('Combat start failed:', err);
        alert('Combat failed to start: ' + err.message + '\n\nCheck browser console (F12) for details.');
      }
    });

    // ── BOOT ──────────────────────────────────────────────────────
    await loadData();
    populateEncounters();
    console.log('CJS Combat Simulator ready.');
  })();
  </script>
</body>
</html>
